<div class="loader-wrapper" *ngIf="show" [class.fade-out]="fadeOut"
     (mousemove)="onMouseMove($event)">

  <div class="scene" [style.transform]="transform">
    
    <!-- Particles -->
    <div class="particles">
      <span *ngFor="let p of particles"></span>
    </div>

    <!-- Logo -->
    <svg class="logo" viewBox="0 0 200 100">
      <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
            class="logo-text">
        SPG
      </text>
    </svg>

  </div>
</div>
